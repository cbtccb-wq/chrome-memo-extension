<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Memo</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <!-- ドラッグ＆ドロップ オーバーレイ -->
  <div id="drop-overlay" class="drop-overlay" hidden>
    <div class="drop-overlay-inner">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <polyline points="21 15 16 10 5 21"/>
      </svg>
      <p>ここに画像をドロップ</p>
    </div>
  </div>

  <div class="layout">
    <!-- ツールバー -->
    <header class="toolbar">
      <h1 class="logo">Quick Memo</h1>
      <div class="toolbar-actions">
        <button id="btn-export-txt" class="btn btn-secondary" title="テキストのみ .txt で保存">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          TXTで保存
        </button>
        <button id="btn-export-html" class="btn btn-secondary" title="画像込みで .html として保存">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          HTMLで保存
        </button>
        <button id="btn-clear" class="btn btn-danger" title="すべて削除">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
          </svg>
          クリア
        </button>
      </div>
    </header>

    <!-- エディタ -->
    <main class="editor-wrap">
      <div
        id="editor"
        class="editor"
        contenteditable="true"
        spellcheck="false"
        data-placeholder="テキストを入力、または画像を貼り付け / ドロップしてください..."
      ></div>
    </main>

    <!-- フッター -->
    <footer class="footer">
      <span id="info-text" class="info"></span>
      <span id="save-status" class="save-status">保存済み</span>
    </footer>
  </div>

  <script src="newtab.js"></script>
</body>
</html>
