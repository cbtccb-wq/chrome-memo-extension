<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quick Memo</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="title">Quick Memo</h1>
      <div class="header-actions">
        <button id="btn-export" class="btn btn-secondary" title="テキストファイルとして保存">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          エクスポート
        </button>
        <button id="btn-clear" class="btn btn-danger" title="メモをすべて削除">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          クリア
        </button>
      </div>
    </header>

    <textarea
      id="memo-area"
      class="memo-area"
      placeholder="ここにメモを入力してください..."
      spellcheck="false"
    ></textarea>

    <footer class="footer">
      <span id="char-count" class="char-count">0 文字</span>
      <span id="save-status" class="save-status">保存済み</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
